  <style>
    html {
      -ms-touch-action: none;
    }

    body,
    canvas,
    div {
      display: block;
      outline: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      -moz-user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      -khtml-user-select: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    /* Remove spin of input type number */

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      /* display: none; <- Crashes Chrome on hover */
      -webkit-appearance: none;
      margin: 0;
      /* <-- Apparently some margin are still there even though it's hidden */
    }

    body {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 0;
      border: 0;
      margin: 0;
      cursor: default;
      color: #888;
      background-color: #333;
      text-align: center;
      font-family: Helvetica, Verdana, Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    #Cocos2dGameContainer {
      position: absolute;
      margin: 0;
      overflow: hidden;
      left: 0px;
      top: 0px;
      display: -webkit-box;
      -webkit-box-orient: horizontal;
      -webkit-box-align: center;
      -webkit-box-pack: center;
    }

    canvas {
      background-color: rgba(0, 0, 0, 0);
    }

    a:link,
    a:visited {
      color: #666;
    }

    a:active,
    a:hover {
      color: #666;
    }

    p.header {
      font-size: small;
    }

    p.footer {
      font-size: x-small;
    }

          rgba(255, 255, 255, 0.15) 75%,
          transparent 75%,
          transparent);
      animation: animate-stripes 1s linear infinite;
    }

      0% {

      }

  <!-- TikTok-only Cocos boot fix. This block is gated by {{__adv_channels_adapter__}} and does not run for other networks. -->
  <script>
      (function () {
        var adNetwork = String('{{__adv_channels_adapter__}}' || '').toLowerCase();
        if (adNetwork !== 'tiktok') return;

        function loadScript(src, done) {
          var script = document.createElement('script');
          script.async = false;
          script.onload = function () { done && done(); };
          script.onerror = function () { console.error('[TikTok Template] Failed to load script:', src); done && done(new Error(src)); };
          script.src = src;
          document.body.appendChild(script);
        }

        function loadTextScriptWithPatch(src, patchFn, done) {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', src, true);
          xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            if (xhr.status !== 200 && xhr.status !== 0) {
              console.error('[TikTok Template] Failed to load text script:', src, xhr.status);
              done && done(new Error(src));
              return;
            }
            var code = xhr.responseText || '';
            if (patchFn) code = patchFn(code);
            var script = document.createElement('script');
            script.text = code + '\n//# sourceURL=' + src;
            document.body.appendChild(script);
            done && done();
          };
          xhr.send(null);
        }

        function patchCocosEngine(code) {
          // Fix Cocos Creator compact value-type deserialize crash:
          // Cannot set properties of undefined (setting '_val')
          var oldSnippet = 'w[5]=function(t,e,i,n){v[n[0]](e[i],n)}';
          var newSnippet = 'w[5]=function(t,e,i,n){e[i]||(e[i]=new d[n[0]]);v[n[0]](e[i],n)}';
          if (code.indexOf(oldSnippet) !== -1) {
            code = code.replace(oldSnippet, newSnippet);
          } else {
            console.warn('[TikTok Template] Cocos deserialize patch target not found. Engine may already be patched or version differs.');
          }
          return code;
        }

        function notifyTikTokReadyAfterSceneLaunch() {
          try {
            if (!window.cc || !cc.director || !cc.Director) return;
            cc.director.once(cc.Director.EVENT_AFTER_SCENE_LAUNCH, function () {
              try {
                if (window.playableSDK && playableSDK.gameReady) {
                  playableSDK.gameReady();
                } else if (window.gameReady) {
                  window.gameReady();
                }
              } catch (e) {
                console.warn('[TikTok Template] gameReady notify failed:', e);
              }
            });
          } catch (e) {
            console.warn('[TikTok Template] ready hook failed:', e);
          }
        }

        function bootTikTokPlayable() {
          if (!window.boot) {
            console.error('[TikTok Template] window.boot is missing after main.js loaded.');
            return;
          }
          notifyTikTokReadyAfterSceneLaunch();
          window.boot();
        }

        // Load TikTok SDK only for TikTok builds.
        loadScript('https://sf16-muse-va.ibytedtos.com/obj/union-fe-nc-i18n/playable/sdk/playable-sdk.js', function () {
          loadScript('src/settings.js', function () {
            loadTextScriptWithPatch('cocos2d-js-min.js', patchCocosEngine, function () {
              loadScript('main.js', bootTikTokPlayable);
            });
          });
        });
      })();
  </script>
